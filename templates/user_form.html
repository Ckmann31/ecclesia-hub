{% extends "base.html" %}
{% block title %}Create User{% endblock %}
{% block subtitle %}Add a new system user{% endblock %}
{% block content %}
<div class="form-card"><form method="POST">
  <div class="form-row">
    <div class="form-group"><label>Username</label><input name="username" required/></div>
    <div class="form-group"><label>Password</label><input name="password" type="password" required/></div>
  </div>
  <div class="form-group"><label>Full Name</label><input name="full_name" required/></div>
  <div class="form-group"><label>Role</label><select name="role">
    <option value="data_entry">Data Entry</option>
    <option value="leader">Leader / Pastor</option>
    <option value="admin">Admin</option>
    <option value="super_admin">Super Admin</option>
  </select></div>
  <button class="btn btn-success" type="submit">💾 Create User</button>
  <a href="/users" class="btn btn-ghost" style="margin-left:8px">Cancel</a>
</form></div>
{% endblock %}
